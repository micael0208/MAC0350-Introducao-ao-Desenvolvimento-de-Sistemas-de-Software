<!DOCTYPE html>

<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu jupiterweb</title>
    <link href="styles.css" rel="stylesheet">
</head>

<body>
    <div class="cabecalho">
        <div class="logos">
            <img class="usp-logo" src="usp-logo.png">
            <img class="usp-logo-texto" src="usp-logo-texto.png"> 
        </div>
        <div class="faixas">
            <div class="faixa-laranja"></div>
            <div class="faixa-azul-claro"></div>
            <div class="faixa-azul-escuro"></div>
        </div>
    </div>
    <div class="conteudo">
        <div class="caixa-navegacao">
                <ul class="navegacao-publico">
                    <li class="menu-header">Público</li>
                    <li>Calendário Escolar</li>
                    <li>Cursos de ingresso</li>
                    <li>Disciplina</li>
                    <li>Editais</li>
                    <li>FAQ</li>
                </ul>
                <ul class="navegacao-restrito">
                    <li class="menu-header">Acesso Restrito</li>
                    <li>Entrar</li>
                    <li>Esqueci a Senha</li>
                    <li>Primeiro Acesso</li>
                </ul>
        </div>
        <div class="area-login">
            <p class="login-header">Login</p>
            <hr class="linha-horizontal">
            <div class="login">
                <div class="usuario">
                    <p class="usuario-texto">Usuário:</p>
                    <form class="form-usuario">
                        <input class="usuario-input" type="text">
                    </form>
                </div>
                <div class="senha">
                    <p class="senha-texto">Senha:</p>
                    <form class="form-senha">
                        <input class="senha-input" type="password">
                    </form>
                </div>
                <input class="botao-entrar" type="submit" value="Entrar"/>
            </div>
            <hr class="linha-horizontal">
            <div class="fundo">
                <p class="info-adicional">Cŕeditos | Fale conosco</p>
                <p class="empresa">&copy; 1999 - 2026 - Superintendência de Tecnologia da Informação/USP</p>
            </div>            
        </div>
    </div>   
</body>

</html>
